<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khusus Buat Kamu ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="hearts-container"></div>

    <!-- Page 1: Landing -->
    <section id="landing-page" class="active">
        <div class="landing-content">
            <div class="envelope-wrapper">
                <div class="envelope">
                    <div class="back-side"></div>
                    <div class="letter">
                        <p>Special Gift For You...</p>
                        <div class="letter-content">
                            <span>Open Me ✨</span>
                        </div>
                    </div>
                    <div class="front-side"></div>
                    <div class="flap"></div>
                </div>
                <div class="heart-seal">❤️</div>
            </div>
            <h1 class="title">Hai Sayang! ✨</h1>
            <p class="subtitle">Aku punya kejutan kecil buat kamu. Klik tombol di bawah ya!</p>
            <button id="open-btn" class="main-btn">Buka Kejutannya 💖</button>
        </div>
    </section>

    <!-- Page 2: Gallery -->
    <section id="gallery-page">
        <div class="surprise-container">
            <div class="photo-frame">
                <img src="foto/WhatsApp Image 2026-05-03 at 09.42.35.jpeg" alt="Kamu Cantik Banget" id="main-photo">
                <div class="sparkles"></div>
            </div>
            <div class="glass-card music-card">
                <div class="music-info">
                    <span class="music-icon">🎵</span>
                    <div class="track-details">
                        <span class="track-name">LANY - XXL</span>
                        <span class="status-text">Playing for you...</span>
                    </div>
                </div>
            </div>
            <button class="next-btn" onclick="nextPage('gallery-page', 'message-page')">Lanjut Sayang? ❤️</button>
        </div>
    </section>

    <!-- Page 3: Messages -->
    <section id="message-page">
        <div class="surprise-container">
            <div class="content-wrapper">
                <div class="glass-card card-1" style="--delay: 0.2s">
                    <h2 class="romantic-text">Untuk Sayangku...</h2>
                    <p id="text-1"></p>
                </div>
                <div class="glass-card card-2" style="--delay: 1s">
                    <p id="text-2"></p>
                </div>
                <div class="glass-card card-3" style="--delay: 2s">
                    <p id="text-3"></p>
                </div>
            </div>
            <button class="next-btn" onclick="nextPage('message-page', 'closing-page')">Terakhir... ✨</button>
        </div>
    </section>

    <!-- Page 4: Closing -->
    <section id="closing-page">
        <div class="surprise-container">
            <div class="glass-card final-card">
                <h1 class="title">Web spesial yang pernah dibuat untuk kamu sayang ❤️</h1>
                <p class="subtitle">Semoga kamu selalu bahagia bareng aku ya.</p>
                <div class="floating-hearts-static">💖💖💖</div>
            </div>
            <div class="footer-msg">Love you always ❤️</div>
        </div>
    </section>

    <audio id="bg-music" loop>
        <source src="musik/LANY - XXL (Official Lyric Video).mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>
</body>
</html>
